<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="theme-color" content="#080a08" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="DaemonLink" />

  <!-- PWA manifest: turns the page into an installable, offline-capable app. -->
  <link rel="manifest" href="manifest.json" />
  <link rel="icon" type="image/svg+xml" href="icon.svg" />
  <link rel="apple-touch-icon" href="icon.svg" />

  <title>DaemonLink :: Console</title>
  <style>
    /* ====================================================================
       DaemonLink Console — single-file PWA
       Mobile-first portrait, terminal aesthetic.
       Tested target: Chrome for Android (Web Serial API requires Chromium).
       ==================================================================== */
    :root {
      --bg:        #080a08;
      --bg-2:      #0e120e;
      --bg-3:      #14181a;
      --border:    #1f2724;
      --fg:        #c8e6c8;
      --fg-dim:    #6f8a6f;
      --accent:    #57ff8c;        /* primary console green */
      --accent-2:  #2bb35a;
      --nfc:       #5be0ff;        /* cyan for [NFC] lines */
      --ir:        #ffd84a;        /* amber for [IR] lines */
      --sys:       #b06bff;        /* violet for [SYS] lines */
      --err:       #ff5f6d;
      --warn:      #ffae42;
      --tx:        #87afff;        /* blue for echoed user commands */
      --font-mono: ui-monospace, "JetBrains Mono", "Fira Mono", "SF Mono",
                   "Cascadia Code", Menlo, Consolas, monospace;
    }

    * { box-sizing: border-box; }

    html, body {
      margin: 0;
      padding: 0;
      background: var(--bg);
      color: var(--fg);
      font-family: var(--font-mono);
      font-size: 14px;
      line-height: 1.45;
      -webkit-font-smoothing: antialiased;
      -webkit-tap-highlight-color: transparent;
      overscroll-behavior: none;
    }

    body {
      display: flex;
      flex-direction: column;
      height: 100vh;
      height: 100dvh;          /* respect mobile address bar */
      max-width: 720px;
      margin: 0 auto;
      padding: env(safe-area-inset-top) env(safe-area-inset-right)
               env(safe-area-inset-bottom) env(safe-area-inset-left);
    }

    /* -------- header ------------------------------------------------- */
    header {
      flex: 0 0 auto;
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 10px 12px;
      background: var(--bg-2);
      border-bottom: 1px solid var(--border);
    }

    .brand {
      display: flex;
      align-items: baseline;
      gap: 6px;
      flex: 1 1 auto;
      min-width: 0;
    }
    .brand .name {
      color: var(--accent);
      font-weight: 600;
      letter-spacing: 0.04em;
    }
    .brand .tag {
      color: var(--fg-dim);
      font-size: 11px;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .status {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 4px 8px;
      font-size: 11px;
      letter-spacing: 0.05em;
      text-transform: uppercase;
      border: 1px solid var(--border);
      border-radius: 999px;
      color: var(--fg-dim);
      background: var(--bg-3);
    }
    .status .dot {
      width: 8px; height: 8px;
      border-radius: 50%;
      background: var(--err);
      box-shadow: 0 0 6px var(--err);
      transition: background 0.2s, box-shadow 0.2s;
    }
    .status[data-state="connected"] { color: var(--accent); }
    .status[data-state="connected"] .dot {
      background: var(--accent);
      box-shadow: 0 0 8px var(--accent);
    }
    .status[data-state="connecting"] { color: var(--warn); }
    .status[data-state="connecting"] .dot {
      background: var(--warn);
      box-shadow: 0 0 8px var(--warn);
      animation: pulse 1s ease-in-out infinite;
    }

    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50%      { opacity: 0.35; }
    }

    /* -------- buttons ------------------------------------------------ */
    .btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 6px;
      min-height: 36px;
      padding: 6px 14px;
      font-family: inherit;
      font-size: 13px;
      font-weight: 500;
      letter-spacing: 0.03em;
      color: var(--accent);
      background: transparent;
      border: 1px solid var(--accent-2);
      border-radius: 4px;
      cursor: pointer;
      transition: background 0.15s, border-color 0.15s, color 0.15s, transform 0.05s;
      user-select: none;
    }
    .btn:hover:not(:disabled) {
      background: rgba(87, 255, 140, 0.08);
      border-color: var(--accent);
    }
    .btn:active:not(:disabled) { transform: scale(0.97); }
    .btn:disabled {
      opacity: 0.4;
      cursor: not-allowed;
    }
    .btn-primary {
      color: var(--bg);
      background: var(--accent);
      border-color: var(--accent);
    }
    .btn-primary:hover:not(:disabled) {
      background: var(--accent-2);
      border-color: var(--accent-2);
    }
    .btn-danger {
      color: var(--err);
      border-color: var(--err);
    }
    .btn-danger:hover:not(:disabled) {
      background: rgba(255, 95, 109, 0.08);
    }

    /* -------- console ------------------------------------------------ */
    main {
      flex: 1 1 auto;
      min-height: 0;
      display: flex;
      flex-direction: column;
    }

    #console {
      flex: 1 1 auto;
      min-height: 0;
      overflow-y: auto;
      padding: 10px 12px;
      background: var(--bg);
      font-size: 12.5px;
      white-space: pre-wrap;
      word-break: break-word;
      scroll-behavior: smooth;
      -webkit-overflow-scrolling: touch;
    }
    #console::-webkit-scrollbar         { width: 6px; }
    #console::-webkit-scrollbar-track   { background: transparent; }
    #console::-webkit-scrollbar-thumb   { background: var(--border); border-radius: 3px; }

    .line {
      display: block;
      padding: 1px 0;
    }
    .line.nfc  { color: var(--nfc); }
    .line.ir   { color: var(--ir);  }
    .line.sys  { color: var(--sys); }
    .line.err  { color: var(--err); }
    .line.warn { color: var(--warn); }
    .line.tx   { color: var(--tx); opacity: 0.85; }
    .line.tx::before { content: "» "; color: var(--fg-dim); }
    .line.meta { color: var(--fg-dim); font-style: italic; }
    .line.meta::before { content: "· "; }

    /* ----- Structured event cards (Phase E) ------------------------- */
    .card {
      display: block;
      margin: 4px 0;
      padding: 6px 8px;
      border-left: 3px solid var(--accent-2);
      border-radius: 2px;
      background: rgba(255, 255, 255, 0.02);
      font-size: 12px;
    }
    .card.nfc { border-left-color: var(--nfc); }
    .card.ir  { border-left-color: var(--ir);  }
    .card.sys { border-left-color: var(--sys); }
    .card.err { border-left-color: var(--err); background: rgba(255, 95, 109, 0.06); }

    .card-head {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-bottom: 2px;
    }
    .badge {
      display: inline-block;
      padding: 1px 6px;
      font-size: 10px;
      font-weight: 600;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      border-radius: 3px;
      background: rgba(255, 255, 255, 0.05);
      color: var(--fg-dim);
    }
    .card.nfc .badge { color: var(--nfc); }
    .card.ir  .badge { color: var(--ir);  }
    .card.sys .badge { color: var(--sys); }
    .card.err .badge { color: var(--err); }

    .card-title {
      flex: 1 1 auto;
      color: var(--fg);
      font-weight: 500;
      word-break: break-word;
    }

    .kv {
      display: grid;
      grid-template-columns: max-content 1fr;
      column-gap: 10px;
      row-gap: 1px;
      margin-top: 2px;
      font-size: 11.5px;
    }
    .kv .k { color: var(--fg-dim); }
    .kv .v { color: var(--fg); word-break: break-word; }
    .kv .v.mono { font-variant-numeric: tabular-nums; }
    .kv .v.long {
      display: -webkit-box;
      -webkit-line-clamp: 2;
      -webkit-box-orient: vertical;
      overflow: hidden;
      text-overflow: ellipsis;
      max-width: 100%;
    }
    .kv .v.long:hover {
      -webkit-line-clamp: unset;
      overflow: auto;
    }

    /* -------- input area --------------------------------------------- */
    .input-bar {
      flex: 0 0 auto;
      display: flex;
      gap: 8px;
      padding: 8px 12px;
      background: var(--bg-2);
      border-top: 1px solid var(--border);
    }
    #cmd {
      flex: 1 1 auto;
      min-width: 0;
      height: 38px;
      padding: 0 10px;
      font-family: inherit;
      font-size: 14px;
      color: var(--fg);
      background: var(--bg-3);
      border: 1px solid var(--border);
      border-radius: 4px;
      outline: none;
      caret-color: var(--accent);
    }
    #cmd:focus {
      border-color: var(--accent-2);
      box-shadow: 0 0 0 2px rgba(87, 255, 140, 0.12);
    }
    #cmd:disabled { opacity: 0.5; }
    #cmd::placeholder { color: var(--fg-dim); }

    /* -------- Channel tabs (Wi-Fi / IR / NFC / ⋯) -------------------- */
    /* The bottom controls used to be one long flat quick-bar with every
       feature glued together. Phase H/UX split them by channel: a thin
       tab strip selects the active channel, and only that channel's
       chips render below. Each tab borrows the colour of its source
       (matching the JSON event cards) so the active one is unambiguous. */
    .tabs {
      flex: 0 0 auto;
      display: flex;
      background: var(--bg-2);
      border-top: 1px solid var(--border);
    }
    .tab {
      flex: 1 1 0;
      min-height: 38px;
      padding: 8px 4px;
      background: transparent;
      border: none;
      border-bottom: 2px solid transparent;
      color: var(--fg-dim);
      font-family: inherit;
      font-size: 12px;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      cursor: pointer;
      transition: color 0.15s, border-color 0.15s, background 0.15s;
    }
    .tab:hover:not(:disabled)         { background: rgba(255, 255, 255, 0.025); }
    .tab.active                        { color: var(--accent); border-bottom-color: var(--accent); }
    .tab.active.tab-ir                 { color: var(--ir);     border-bottom-color: var(--ir);     }
    .tab.active.tab-nfc                { color: var(--nfc);    border-bottom-color: var(--nfc);    }
    .tab.active.tab-sys                { color: var(--sys);    border-bottom-color: var(--sys);    }
    .tab:disabled { opacity: 0.45; cursor: not-allowed; }

    /* Per-channel chip rows. Only the .active panel is rendered; the
       others are display:none so they do not steal vertical space. */
    .tab-panel {
      flex: 0 0 auto;
      display: none;
      gap: 6px;
      padding: 8px 12px 10px;
      background: var(--bg-2);
      overflow-x: auto;
      scrollbar-width: none;
    }
    .tab-panel.active            { display: flex; }
    .tab-panel::-webkit-scrollbar { display: none; }
    .tab-panel .btn {
      flex: 0 0 auto;
      min-height: 32px;
      padding: 4px 12px;
      font-size: 12px;
      letter-spacing: 0.04em;
    }
    .tab-panel.empty {
      justify-content: center;
      color: var(--fg-dim);
      font-size: 11.5px;
      font-style: italic;
    }

    /* -------- Library panel (Phase G) ------------------------------- */
    .library {
      flex: 0 0 auto;
      max-height: 0;
      overflow: hidden;
      transition: max-height 0.25s ease;
      background: var(--bg-2);
      border-top: 1px solid var(--border);
    }
    .library.open { max-height: 35vh; overflow-y: auto; }
    .library-head {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 8px 12px;
      font-size: 11px;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: var(--fg-dim);
      border-bottom: 1px dashed var(--border);
    }
    .library-head .meta { flex: 1 1 auto; text-align: right; font-size: 10px; }
    .library-list {
      display: flex;
      flex-direction: column;
      gap: 4px;
      padding: 6px 8px 10px;
    }
    .lib-item {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 6px 8px;
      background: var(--bg-3);
      border-left: 2px solid var(--ir);
      border-radius: 3px;
      font-size: 12px;
    }
    .lib-item .lib-name { flex: 1 1 auto; color: var(--fg); word-break: break-all; }
    .lib-item .lib-size { color: var(--fg-dim); font-size: 10.5px; min-width: 50px; text-align: right; }
    .lib-item .play {
      flex: 0 0 auto;
      min-height: 28px;
      padding: 2px 10px;
      font-size: 11px;
      color: var(--ir);
      border-color: var(--ir);
    }
    .lib-empty {
      padding: 12px;
      color: var(--fg-dim);
      text-align: center;
      font-size: 11.5px;
    }

    /* -------- IR Tools panel (collapsible) -------------------------- */
    /* Wraps the IR-send strip and the IR-save row in a single element
       that animates open/closed via max-height. Default = collapsed
       so phones see only console + quick chips + main input on first
       paint, leaving the maximum vertical space for the log when the
       on-screen keyboard pops up. */
    .ir-tools {
      flex: 0 0 auto;
      max-height: 0;
      overflow: hidden;
      transition: max-height 0.25s ease;
      background: var(--bg-2);
      border-top: 1px dashed var(--border);
    }
    .ir-tools.open { max-height: 220px; }

    /* The toggle chips inside the IR tab show an active state when their
       panel is open, so the user can spot at a glance which one is up. */
    .tab-panel .btn.toggle.active {
      background: rgba(255, 216, 74, 0.10);
      border-color: var(--ir);
      color: var(--ir);
    }

    /* -------- IR send strip (Phase D) ------------------------------- */
    .ir-bar {
      flex: 0 0 auto;
      display: flex;
      gap: 6px;
      padding: 6px 12px;
      background: var(--bg-2);
    }
    .ir-bar .ir-label {
      display: inline-flex;
      align-items: center;
      padding: 0 6px;
      font-size: 11px;
      letter-spacing: 0.08em;
      color: var(--ir);
      border-left: 2px solid var(--ir);
    }
    #irPayload {
      flex: 1 1 auto;
      min-width: 0;
      height: 34px;
      padding: 0 10px;
      font-family: inherit;
      font-size: 13px;
      color: var(--fg);
      background: var(--bg-3);
      border: 1px solid var(--border);
      border-radius: 4px;
      outline: none;
    }
    #irPayload:focus {
      border-color: var(--ir);
      box-shadow: 0 0 0 2px rgba(255, 216, 74, 0.12);
    }
    #irPayload::placeholder { color: var(--fg-dim); }
    #irPayload:disabled     { opacity: 0.5; }
    #irSendBtn {
      flex: 0 0 auto;
      min-height: 34px;
      padding: 4px 12px;
      font-size: 12px;
      color: var(--ir);
      border-color: var(--ir);
    }
    #irSendBtn:hover:not(:disabled) {
      background: rgba(255, 216, 74, 0.08);
    }

    /* Inline save row inside the IR-tools wrapper */
    .ir-save-row {
      flex: 0 0 auto;
      display: flex;
      gap: 6px;
      padding: 0 12px 8px;
      background: var(--bg-2);
    }
    #irSaveName {
      flex: 1 1 auto;
      min-width: 0;
      height: 30px;
      padding: 0 8px;
      font-family: inherit;
      font-size: 12px;
      color: var(--fg);
      background: var(--bg-3);
      border: 1px solid var(--border);
      border-radius: 4px;
      outline: none;
    }
    #irSaveName:focus { border-color: var(--ir); }
    #irSaveName::placeholder { color: var(--fg-dim); }
    #irSaveBtn, #libToggleBtn {
      flex: 0 0 auto;
      min-height: 30px;
      padding: 2px 10px;
      font-size: 11px;
    }

    /* -------- Update toast (Phase B.2) ------------------------------- */
    /* Floats above the input bar (and above the on-screen keyboard if it
       opens) without blocking the console. Dark surface, amber accent —
       same colour we use for [IR] events and 'connecting' status, which
       reads as "heads-up, not an error" in this palette. */
    .update-toast {
      position: fixed;
      left: 50%;
      /* env() padding so it stays clear of the home-indicator on iOS and
         the gesture bar on Android in PWA-installed mode. The +84 px
         lifts it above the input + tab strip combo. */
      bottom: calc(env(safe-area-inset-bottom, 0px) + 84px);
      transform: translateX(-50%) translateY(12px);
      display: flex;
      align-items: center;
      gap: 10px;
      max-width: min(420px, calc(100% - 24px));
      padding: 10px 12px;
      background: var(--bg-3);
      border: 1px solid var(--warn);
      border-left: 3px solid var(--warn);
      border-radius: 4px;
      font-size: 12.5px;
      color: var(--fg);
      box-shadow: 0 6px 20px rgba(0, 0, 0, 0.55);
      opacity: 0;
      pointer-events: none;
      visibility: hidden;
      transition: opacity 0.2s ease, transform 0.2s ease, visibility 0s linear 0.2s;
      z-index: 100;
    }
    .update-toast.show {
      opacity: 1;
      transform: translateX(-50%) translateY(0);
      pointer-events: auto;
      visibility: visible;
      transition: opacity 0.2s ease, transform 0.2s ease, visibility 0s;
    }
    .update-toast .toast-msg {
      flex: 1 1 auto;
      min-width: 0;
      color: var(--warn);
      letter-spacing: 0.02em;
    }
    .update-toast .toast-msg .toast-sub {
      display: block;
      color: var(--fg-dim);
      font-size: 11px;
      letter-spacing: 0.04em;
      text-transform: uppercase;
      margin-top: 1px;
    }
    .update-toast .toast-btn {
      flex: 0 0 auto;
      min-height: 30px;
      padding: 4px 12px;
      font-size: 12px;
      color: var(--warn);
      border-color: var(--warn);
    }
    .update-toast .toast-btn:hover:not(:disabled) {
      background: rgba(255, 174, 66, 0.10);
    }

    /* -------- responsive tweaks -------------------------------------- */
    @media (max-width: 380px) {
      header           { padding: 8px 10px; gap: 6px; }
      .brand .tag      { display: none; }
      .btn             { padding: 6px 10px; font-size: 12px; }
      .input-bar       { padding: 6px 8px; }
    }
  </style>
</head>

<body>
  <header>
    <div class="brand">
      <span class="name">DaemonLink</span>
      <span class="tag">// tactical console</span>
    </div>
    <span id="status" class="status" data-state="disconnected" aria-live="polite">
      <span class="dot" aria-hidden="true"></span>
      <span id="statusLabel">offline</span>
    </span>
    <button id="connectBtn" class="btn btn-primary" type="button">Connect</button>
  </header>

  <main>
    <div id="console" role="log" aria-live="polite" aria-label="Serial output"></div>

    <section class="library" id="library" aria-label="Saved IR payloads">
      <div class="library-head">
        <span>Library · /ir</span>
        <span class="meta" id="libraryMeta"></span>
        <button id="libRefreshBtn" class="btn" type="button" disabled>Refresh</button>
      </div>
      <div class="library-list" id="libraryList">
        <div class="lib-empty">no entries — capture an IR signal and tap Save</div>
      </div>
    </section>

    <section class="ir-tools" id="irTools" aria-label="IR transmit and save controls">
      <form class="ir-bar" id="irForm" autocomplete="off">
        <span class="ir-label" aria-hidden="true">IR ▶</span>
        <input id="irPayload" type="text"
               placeholder="paste replay payload, e.g. NEC 32 0x00FF629D  or  raw 38 9000,4500,…"
               autocapitalize="none" autocorrect="off" spellcheck="false" disabled />
        <button id="irSendBtn" class="btn" type="submit" disabled>Transmit IR</button>
      </form>

      <form class="ir-save-row" id="irSaveForm" autocomplete="off">
        <input id="irSaveName" type="text"
               placeholder="name for last capture (A-Z 0-9 _ -)"
               pattern="[A-Za-z0-9_\-]{1,32}" maxlength="32"
               autocapitalize="none" autocorrect="off" spellcheck="false" disabled />
        <button id="irSaveBtn" class="btn" type="submit" disabled>Save</button>
      </form>
    </section>

    <nav class="tabs" id="tabs" role="tablist">
      <button class="tab tab-wifi active" type="button" role="tab"
              data-tab="wifi" aria-selected="true"  aria-controls="panel-wifi" disabled>Wi-Fi</button>
      <button class="tab tab-ir"          type="button" role="tab"
              data-tab="ir"   aria-selected="false" aria-controls="panel-ir"   disabled>IR</button>
      <button class="tab tab-nfc"         type="button" role="tab"
              data-tab="nfc"  aria-selected="false" aria-controls="panel-nfc"  disabled>NFC</button>
      <button class="tab tab-sys"         type="button" role="tab"
              data-tab="sys"  aria-selected="false" aria-controls="panel-sys"  disabled>···</button>
    </nav>

    <!-- Per-channel chip rows. Only the .active one renders; others are
         display:none. Hidden vs in-DOM matters: we keep them in the DOM
         so disabled state and event listeners stay wired across switches. -->
    <div class="tab-panel active" id="panel-wifi" role="tabpanel" aria-labelledby="tab-wifi">
      <button class="btn quick" type="button" data-cmd="scanap"   disabled>Scan APs</button>
      <button class="btn quick" type="button" data-cmd="stopscan" disabled>Stop Scan</button>
    </div>

    <div class="tab-panel" id="panel-ir" role="tabpanel" aria-labelledby="tab-ir">
      <button class="btn quick" type="button" data-cmd="ir_capture" disabled>▶ Capture</button>
      <button id="irToolsBtn"  class="btn quick toggle" type="button"
              aria-expanded="false" aria-controls="irTools" disabled>Transmit ▾</button>
      <button id="libToggleBtn" class="btn quick toggle" type="button"
              aria-expanded="false" aria-controls="library" disabled>Library ▾</button>
    </div>

    <div class="tab-panel" id="panel-nfc" role="tabpanel" aria-labelledby="tab-nfc">
      <button class="btn quick" type="button" data-cmd="nfc_read" disabled>▶ Read Mifare</button>
    </div>

    <div class="tab-panel" id="panel-sys" role="tabpanel" aria-labelledby="tab-sys">
      <button class="btn quick" type="button" data-cmd="dl_help" disabled>DL Help</button>
      <button class="btn quick" type="button" data-cmd="help"    disabled>Marauder Help</button>
    </div>

    <form class="input-bar" id="inputForm" autocomplete="off">
      <input id="cmd" type="text" placeholder="type a command and press Enter…"
             autocapitalize="none" autocorrect="off" spellcheck="false" disabled />
      <button id="sendBtn" class="btn" type="submit" disabled>Send</button>
    </form>
  </main>

  <!-- PWA update prompt — surfaced when sw.js detects a fresh shell
       installed and waiting. Hidden until needed; the user dismisses it
       by tapping Reload (which applies the update) or by ignoring it. -->
  <div id="updateToast" class="update-toast" role="status" aria-live="polite" aria-hidden="true">
    <span class="toast-msg">
      Actualización táctica disponible
      <span class="toast-sub">// new shell ready</span>
    </span>
    <button id="updateReloadBtn" class="btn toast-btn" type="button">Recargar</button>
  </div>

  <script>
  /* =====================================================================
     DaemonLink PWA — Web Serial bridge
     ===================================================================== */
  "use strict";

  // ---------- DOM refs -------------------------------------------------
  const el = {
    consoleBox:  document.getElementById("console"),
    status:      document.getElementById("status"),
    statusLabel: document.getElementById("statusLabel"),
    connectBtn:  document.getElementById("connectBtn"),
    inputForm:   document.getElementById("inputForm"),
    cmd:         document.getElementById("cmd"),
    sendBtn:     document.getElementById("sendBtn"),
    irForm:      document.getElementById("irForm"),
    irPayload:   document.getElementById("irPayload"),
    irSendBtn:   document.getElementById("irSendBtn"),
    irSaveForm:  document.getElementById("irSaveForm"),
    irSaveName:  document.getElementById("irSaveName"),
    irSaveBtn:   document.getElementById("irSaveBtn"),
    irTools:     document.getElementById("irTools"),
    irToolsBtn:  document.getElementById("irToolsBtn"),
    libToggleBtn:document.getElementById("libToggleBtn"),
    libRefreshBtn: document.getElementById("libRefreshBtn"),
    library:     document.getElementById("library"),
    libraryList: document.getElementById("libraryList"),
    libraryMeta: document.getElementById("libraryMeta"),
    tabs:        document.getElementById("tabs"),
    tabButtons:  Array.from(document.querySelectorAll(".tab")),
    tabPanels:   Array.from(document.querySelectorAll(".tab-panel")),
    chipButtons: Array.from(document.querySelectorAll(".tab-panel .btn[data-cmd]")),
  };

  // ---------- State machine -------------------------------------------
  const state = {
    port:   null,
    reader: null,
    writer: null,
    abort:  null,           // AbortController for the read loop
    encoder: new TextEncoder(),
  };

  // Auto-scroll only when the user is already pinned to the bottom — so
  // scrolling up to read history isn't yanked away by new lines.
  let pinnedToBottom = true;
  el.consoleBox.addEventListener("scroll", () => {
    const dist = el.consoleBox.scrollHeight - el.consoleBox.scrollTop - el.consoleBox.clientHeight;
    pinnedToBottom = dist < 24;
  }, { passive: true });

  // ---------- Console helpers -----------------------------------------
  // Channel routing for plain-text lines (Marauder native logs and any
  // pre-JSON-era firmware).
  function classify(line) {
    if (line.startsWith("[NFC]"))  return "nfc";
    if (line.startsWith("[IR]"))   return "ir";
    if (line.startsWith("[SYS]"))  return "sys";
    if (/error|fail/i.test(line))  return "err";
    if (/warn/i.test(line))        return "warn";
    return "";
  }

  function trimHistory() {
    while (el.consoleBox.childElementCount > 2000) {
      el.consoleBox.removeChild(el.consoleBox.firstChild);
    }
  }

  function flushScroll() {
    if (pinnedToBottom) {
      el.consoleBox.scrollTop = el.consoleBox.scrollHeight;
    }
  }

  function appendLine(text, cls) {
    const span = document.createElement("span");
    span.className = "line" + (cls ? " " + cls : "");
    span.textContent = text;
    el.consoleBox.appendChild(span);
    trimHistory();
    flushScroll();
  }

  function logMeta(text)  { appendLine(text, "meta"); }
  function logError(text) { appendLine(text, "err"); }
  function logTx(text)    { appendLine(text, "tx"); }

  // ---------- Structured renderer (Phase E) ---------------------------
  // Tries JSON.parse first; if the line is a DaemonLink-shaped event
  // (object with a "source" string), renders it as a card. Anything else
  // (Marauder native scan output, pre-Phase-E logs, garbled chunks) falls
  // through to the plain-text renderer.

  // Display titles per (source, event) tuple. Any combination not listed
  // here just shows the event verbatim — keeps the UI forward-compatible
  // when we add new event types in firmware.
  const EVENT_TITLES = {
    "nfc:tag":     "Tag detected",
    "nfc:wait":    "Waiting for tag",
    "nfc:timeout": "Tag wait timed out",
    "nfc:ready":   "PN532 ready",
    "ir:capture":  "IR signal captured",
    "ir:wait":     "Capturing IR…",
    "ir:timeout":  "IR capture timed out",
    "ir:send":     "IR transmission",
    "ir:ready":    "IR module ready",
    "sys:help":    "Available DaemonLink commands",
  };

  // Keys we *don't* want to display as raw key/value rows (already used
  // for the title or visually redundant).
  const HIDDEN_KEYS = new Set(["source", "event", "level", "msg", "commands", "note"]);

  function renderJsonEvent(obj) {
    const source = (obj.source || "").toLowerCase();
    const isErr  = obj.level === "error";
    const cls    = isErr ? "err" : (source || "");

    const card = document.createElement("div");
    card.className = "card" + (cls ? " " + cls : "");

    // --- header: badge + title ---
    const head = document.createElement("div");
    head.className = "card-head";

    const badge = document.createElement("span");
    badge.className = "badge";
    badge.textContent = (source || "log").toUpperCase();
    head.appendChild(badge);

    const title = document.createElement("span");
    title.className = "card-title";
    if (isErr) {
      title.textContent = obj.msg || "error";
    } else {
      title.textContent =
        EVENT_TITLES[`${source}:${obj.event}`] ||
        obj.msg ||
        obj.event ||
        "event";
    }
    head.appendChild(title);
    card.appendChild(head);

    // --- key/value table ---
    const kv = document.createElement("div");
    kv.className = "kv";
    let rendered = 0;
    for (const [k, v] of Object.entries(obj)) {
      if (HIDDEN_KEYS.has(k)) continue;
      if (v === null || v === undefined) continue;

      const kSpan = document.createElement("span");
      kSpan.className = "k";
      kSpan.textContent = k;

      const vSpan = document.createElement("span");
      vSpan.className = "v mono";
      let text;
      if (typeof v === "object") {
        try { text = JSON.stringify(v); } catch (_) { text = String(v); }
      } else {
        text = String(v);
      }
      // Long replay/raw payloads get clamped with hover-to-expand.
      if (text.length > 80) vSpan.classList.add("long");
      vSpan.textContent = text;

      kv.appendChild(kSpan);
      kv.appendChild(vSpan);
      rendered++;
    }
    if (rendered > 0) card.appendChild(kv);

    // --- special case: dl_help renders the commands array as a list ---
    if (Array.isArray(obj.commands)) {
      const list = document.createElement("div");
      list.className = "kv";
      for (const c of obj.commands) {
        const k = document.createElement("span");
        k.className = "k";
        k.textContent = c.name;
        const v = document.createElement("span");
        v.className = "v";
        v.textContent = c.desc || "";
        list.appendChild(k);
        list.appendChild(v);
      }
      card.appendChild(list);
    }

    el.consoleBox.appendChild(card);
    trimHistory();
    flushScroll();
  }

  // Heuristic check: only call JSON.parse on lines that *look* like a
  // JSON object — saves the parse cost (and stack trace) on every
  // Marauder log line. Allow optional leading whitespace.
  function looksLikeJson(line) {
    return /^\s*\{/.test(line);
  }

  function handleLine(line) {
    if (looksLikeJson(line)) {
      try {
        const obj = JSON.parse(line);
        if (obj && typeof obj === "object" && typeof obj.source === "string") {
          // Side effect: keep the library panel in sync with FS events.
          interceptForLibrary(obj);
          renderJsonEvent(obj);
          return;
        }
      } catch (_) {
        // Fall through to plain-text rendering.
      }
    }
    appendLine(line, classify(line));
  }

  // ---------- Library panel (Phase G) ---------------------------------
  function renderLibrary(items, totalBytes, usedBytes) {
    el.libraryList.innerHTML = "";
    if (!items || items.length === 0) {
      const empty = document.createElement("div");
      empty.className = "lib-empty";
      empty.textContent = "no entries — capture an IR signal and tap Save";
      el.libraryList.appendChild(empty);
    } else {
      for (const it of items) {
        const row = document.createElement("div");
        row.className = "lib-item";

        const name = document.createElement("span");
        name.className = "lib-name";
        name.textContent = it.name;
        row.appendChild(name);

        const size = document.createElement("span");
        size.className = "lib-size";
        size.textContent = (it.size || 0) + " B";
        row.appendChild(size);

        const playBtn = document.createElement("button");
        playBtn.type = "button";
        playBtn.className = "btn play";
        playBtn.textContent = "▶ Play";
        playBtn.addEventListener("click", () => {
          sendCommand("ir_play " + it.name);
        });
        row.appendChild(playBtn);

        el.libraryList.appendChild(row);
      }
    }
    if (typeof totalBytes === "number" && typeof usedBytes === "number") {
      const pct = totalBytes ? Math.round((usedBytes / totalBytes) * 100) : 0;
      el.libraryMeta.textContent =
        `${items ? items.length : 0} files · ${usedBytes}/${totalBytes} B (${pct}%)`;
    } else {
      el.libraryMeta.textContent = "";
    }
  }

  // Inspect every JSON event: if it carries an FS list, refresh the panel.
  // If it's a save/remove acknowledgement, auto-refresh so the user sees
  // the change without an extra tap.
  function interceptForLibrary(obj) {
    if (obj.source !== "fs") return;
    if (obj.event === "list") {
      renderLibrary(obj.items || [], obj.total, obj.used);
    } else if (obj.event === "save" || obj.event === "remove") {
      sendCommand("fs_list");
    }
  }

  // ---------- Status indicator ----------------------------------------
  function setStatus(stateName, label) {
    el.status.dataset.state = stateName;
    el.statusLabel.textContent = label;
  }

  function setConnected(isConnected) {
    el.cmd.disabled         = !isConnected;
    el.sendBtn.disabled     = !isConnected;
    el.irPayload.disabled   = !isConnected;
    el.irSendBtn.disabled   = !isConnected;
    el.irSaveName.disabled  = !isConnected;
    el.irSaveBtn.disabled   = !isConnected;
    el.irToolsBtn.disabled     = !isConnected;
    el.libToggleBtn.disabled   = !isConnected;
    el.libRefreshBtn.disabled  = !isConnected;
    el.connectBtn.textContent       = isConnected ? "Disconnect" : "Connect";
    el.connectBtn.classList.toggle("btn-primary", !isConnected);
    el.connectBtn.classList.toggle("btn-danger",   isConnected);
    if (isConnected) {
      setStatus("connected", "online");
      el.cmd.focus();
    } else {
      setStatus("disconnected", "offline");
    }
  }

  // ---------- Line transformer (chunks -> complete lines) -------------
  // Spec-recommended pattern: a TransformStream that buffers incoming
  // text and emits one chunk per line, splitting on \r?\n. This is what
  // makes channel-prefix routing work; without it, [NFC] could land in
  // a different chunk than the rest of the line.
  class LineBreakTransformer {
    constructor() { this.buffer = ""; }
    transform(chunk, controller) {
      this.buffer += chunk;
      const lines = this.buffer.split(/\r?\n/);
      this.buffer = lines.pop();         // last fragment may be partial
      for (const line of lines) controller.enqueue(line);
    }
    flush(controller) {
      if (this.buffer) controller.enqueue(this.buffer);
    }
  }

  // ---------- Connect / disconnect ------------------------------------
  async function connect() {
    if (!("serial" in navigator)) {
      logError("Web Serial API not supported. Use Chrome/Edge on desktop, or Chrome on Android (chrome://flags -> Experimental Web Platform features).");
      return;
    }

    setStatus("connecting", "asking…");
    let port;
    try {
      port = await navigator.serial.requestPort();
    } catch (err) {
      // User dismissed the picker — DOMException "NotFoundError".
      setStatus("disconnected", "offline");
      logMeta("port selection cancelled");
      return;
    }

    try {
      await port.open({ baudRate: 115200, dataBits: 8, stopBits: 1, parity: "none", flowControl: "none" });
    } catch (err) {
      setStatus("disconnected", "offline");
      logError(`failed to open port: ${err.message}`);
      return;
    }

    state.port = port;

    // TX writer: keep a single Writer for the lifetime of the session.
    state.writer = port.writable.getWriter();

    // RX side: TextDecoder -> LineBreakTransformer -> for-await reader.
    // We use AbortController to cancel the read pipeline on disconnect.
    state.abort = new AbortController();
    setConnected(true);

    const info = port.getInfo?.();
    if (info) {
      logMeta(`connected: USB ${("0000" + (info.usbVendorId || 0).toString(16)).slice(-4)}:${("0000" + (info.usbProductId || 0).toString(16)).slice(-4)} @ 115200 8N1`);
    } else {
      logMeta("connected @ 115200 8N1");
    }

    port.addEventListener("disconnect", () => {
      logError("device disconnected (cable pulled)");
      teardown();
    });

    readLoop().catch((err) => {
      if (err?.name !== "AbortError") {
        logError(`read loop error: ${err.message}`);
      }
    });
  }

  async function readLoop() {
    const decoder = new TextDecoderStream("utf-8", { fatal: false });
    const lineStream = new TransformStream(new LineBreakTransformer());
    const decoderClose = state.port.readable
      .pipeTo(decoder.writable, { signal: state.abort.signal })
      .catch(() => { /* abort throws; benign */ });

    const reader = decoder.readable
      .pipeThrough(lineStream)
      .getReader();
    state.reader = reader;

    try {
      while (true) {
        const { value, done } = await reader.read();
        if (done) break;
        if (value !== undefined) handleLine(value);
      }
    } finally {
      try { reader.releaseLock(); } catch (_) {}
      state.reader = null;
      await decoderClose;
    }
  }

  async function disconnect() {
    if (!state.port) return;
    await teardown();
  }

  async function teardown() {
    setStatus("connecting", "closing…");

    // 1. Cancel the reader so the for-await loop exits.
    if (state.abort) {
      try { state.abort.abort(); } catch (_) {}
    }
    if (state.reader) {
      try { await state.reader.cancel(); } catch (_) {}
    }

    // 2. Release the writer and close the port.
    if (state.writer) {
      try { await state.writer.close(); } catch (_) {}
      try { state.writer.releaseLock(); } catch (_) {}
      state.writer = null;
    }
    if (state.port) {
      try { await state.port.close(); } catch (_) {}
      state.port = null;
    }
    state.abort = null;

    setConnected(false);
    logMeta("disconnected");
  }

  // ---------- Send -----------------------------------------------------
  async function sendCommand(cmd) {
    cmd = cmd.trim();
    if (!cmd || !state.writer) return;
    try {
      await state.writer.write(state.encoder.encode(cmd + "\n"));
      logTx(cmd);
    } catch (err) {
      logError(`tx failed: ${err.message}`);
    }
  }

  // ---------- Wire-up --------------------------------------------------
  el.connectBtn.addEventListener("click", () => {
    if (state.port) disconnect();
    else            connect();
  });

  el.inputForm.addEventListener("submit", (ev) => {
    ev.preventDefault();
    const text = el.cmd.value;
    el.cmd.value = "";
    sendCommand(text);
  });

  el.irForm.addEventListener("submit", (ev) => {
    ev.preventDefault();
    const payload = el.irPayload.value.trim();
    if (!payload) return;
    // Normalise: drop a leading "ir_send " if the user pasted the full
    // command, and collapse internal whitespace so the firmware parser
    // sees clean tokens.
    const cleaned = payload.replace(/^ir_send\s+/i, "").replace(/\s+/g, " ");
    sendCommand("ir_send " + cleaned);
  });

  el.irSaveForm.addEventListener("submit", (ev) => {
    ev.preventDefault();
    const name = el.irSaveName.value.trim();
    if (!name) return;
    if (!/^[A-Za-z0-9_\-]{1,32}$/.test(name)) {
      logError("save: name must match [A-Za-z0-9_-]{1,32}");
      return;
    }
    sendCommand("ir_save " + name);
    el.irSaveName.value = "";
  });

  // Mutex collapsibles: only one of {Library, IR Tools} can be open at
  // a time. Opening one auto-closes any siblings — keeps the console
  // visible and avoids stacking multiple panels over the log on phones.
  const COLLAPSIBLES = [];      // {chip, panel, onOpen} registered by bindToggle
  function setCollapsibleState(entry, open) {
    entry.panel.classList.toggle("open", open);
    entry.chip.classList.toggle("active", open);
    entry.chip.setAttribute("aria-expanded", String(open));
    entry.chip.textContent = entry.chip.textContent.replace(/[▾▴]\s*$/, "").trimEnd() +
                             (open ? " ▴" : " ▾");
  }
  function bindToggle(chip, panel, onOpen) {
    const entry = { chip, panel, onOpen };
    COLLAPSIBLES.push(entry);
    chip.addEventListener("click", () => {
      const willOpen = !panel.classList.contains("open");
      // Close every other panel first, then flip ours.
      COLLAPSIBLES.forEach((e) => { if (e !== entry) setCollapsibleState(e, false); });
      setCollapsibleState(entry, willOpen);
      if (willOpen && onOpen) onOpen();
    });
  }

  bindToggle(el.libToggleBtn, el.library, () => {
    if (state.port) sendCommand("fs_list");
  });
  bindToggle(el.irToolsBtn, el.irTools);

  el.libRefreshBtn.addEventListener("click", () => {
    if (state.port) sendCommand("fs_list");
  });

  // ---------- Tab strip --------------------------------------------------
  function activateTab(name) {
    el.tabButtons.forEach((b) => {
      const on = b.dataset.tab === name;
      b.classList.toggle("active", on);
      b.setAttribute("aria-selected", String(on));
    });
    el.tabPanels.forEach((p) => {
      p.classList.toggle("active", p.id === "panel-" + name);
    });
    // Auto-close any open collapsible (Library / IR Tools) when the
    // active tab changes — otherwise a panel could stay open while its
    // toggle chip is hidden inside a different tab, leaving the user no
    // visible way to dismiss it. COLLAPSIBLES is populated by bindToggle
    // calls further down; safe to read here because activateTab is only
    // invoked from click handlers (after the script body finishes).
    COLLAPSIBLES.forEach((e) => setCollapsibleState(e, false));
  }
  el.tabs.addEventListener("click", (ev) => {
    const t = ev.target.closest(".tab");
    if (!t || t.disabled) return;
    activateTab(t.dataset.tab);
  });

  // ---------- Chip click delegation -------------------------------------
  // Single document-level listener handles every chip across every panel.
  document.addEventListener("click", (ev) => {
    const target = ev.target.closest(".tab-panel .btn[data-cmd]");
    if (!target || target.disabled) return;
    sendCommand(target.dataset.cmd);
  });

  // ---------- Connection-state sync for chips and tabs ------------------
  // Chips with data-cmd (one-shot actions) and the tab buttons themselves
  // need to enable/disable in lockstep with the Web Serial connection.
  // Toggle chips (Transmit ▾ / Library ▾) live alongside data-cmd chips
  // and are already handled in setConnected().
  const _setConnected = setConnected;
  setConnected = function(isConnected) {       // eslint-disable-line
    _setConnected(isConnected);
    el.chipButtons.forEach((b) => { b.disabled = !isConnected; });
    el.tabButtons.forEach((b) => { b.disabled = !isConnected; });
  };
  // Initial paint: everything stays disabled until first connect.
  el.chipButtons.forEach((b) => { b.disabled = true; });
  el.tabButtons.forEach((b) => { b.disabled = true; });

  // ---------- Boot banner ----------------------------------------------
  appendLine("DaemonLink :: tactical console", "sys");
  if (!("serial" in navigator)) {
    logError("This browser does not expose the Web Serial API.");
    logMeta("Use Chrome / Edge on desktop, or Chrome on Android.");
    el.connectBtn.disabled = true;
  } else {
    logMeta("Web Serial API ready. Tap Connect, pick the ESP32-S3 port.");
  }

  // ---------- PWA: register the Service Worker ------------------------
  // Runs only on secure contexts (https / localhost). We register on the
  // window 'load' event so it does not race the initial paint, and we
  // surface fresh shells via a floating toast (Phase B.2) instead of a
  // line in the console — it is too easy to miss a meta line in a long
  // log.
  if ("serviceWorker" in navigator) {
    const toast       = document.getElementById("updateToast");
    const reloadBtn   = document.getElementById("updateReloadBtn");

    // The worker the user has just been told about. Captured when the
    // 'installed' state fires so the Reload button can postMessage to
    // the right instance even if a newer one comes along later.
    let waitingWorker = null;

    function showUpdateToast(worker) {
      waitingWorker = worker;
      toast.classList.add("show");
      toast.setAttribute("aria-hidden", "false");
    }

    function trackWorker(worker) {
      if (!worker) return;
      worker.addEventListener("statechange", () => {
        if (worker.state === "installed" && navigator.serviceWorker.controller) {
          // 'installed' + an existing controller = an UPDATE (vs the
          // first-ever install on this device, where controller is null
          // and the toast would be misleading).
          showUpdateToast(worker);
        }
      });
    }

    reloadBtn.addEventListener("click", () => {
      if (!waitingWorker) {
        // Defensive: should not happen because the button is only
        // visible when the toast is shown, but guard against double-tap.
        window.location.reload();
        return;
      }
      // Tell the new worker to take over right now. Our sw.js listens
      // for SKIP_WAITING and calls self.skipWaiting().
      waitingWorker.postMessage("SKIP_WAITING");
    });

    // skipWaiting() activates the new worker -> 'controllerchange' fires
    // on the page. Reload exactly once, regardless of how many tabs are
    // open or how many times the worker rolls forward.
    let reloading = false;
    navigator.serviceWorker.addEventListener("controllerchange", () => {
      if (reloading) return;
      reloading = true;
      window.location.reload();
    });

    window.addEventListener("load", () => {
      navigator.serviceWorker
        .register("sw.js", { scope: "./" })
        .then((reg) => {
          logMeta(`service worker active (scope ${reg.scope})`);

          // Edge case: page loaded with an already-waiting worker (e.g.
          // user closed the previous tab without reloading). Show the
          // toast immediately.
          if (reg.waiting && navigator.serviceWorker.controller) {
            showUpdateToast(reg.waiting);
          }
          // Worker installing right now — track it.
          trackWorker(reg.installing);
          // Future updates: each updatefound carries a fresh installer.
          reg.addEventListener("updatefound", () => {
            trackWorker(reg.installing);
          });
        })
        .catch((err) => logError(`SW registration failed: ${err.message}`));
    });
  }
  </script>
</body>
</html>
