name: DaemonLink CI/CD

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  # Manual trigger for re-deploys without a code change.
  workflow_dispatch:

# Stop redundant in-flight runs on the same branch (saves Action minutes
# when several pushes land back-to-back).
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ===================================================================
  #  Job 1 — Firmware CI
  #  Apply the Marauder patch (idempotent) and compile the firmware.
  #  Catches regressions caused by upstream Marauder moving or our
  #  patch context drifting.
  # ===================================================================
  firmware:
    name: firmware (pio run)
    runs-on: ubuntu-latest
    timeout-minutes: 25

    steps:
      - name: Checkout repo (with submodule)
        uses: actions/checkout@v4
        with:
          submodules: recursive
          # Pinned commit in .gitmodules → reproducible builds.
          fetch-depth: 1

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Cache PlatformIO core + packages
        uses: actions/cache@v4
        with:
          path: |
            ~/.cache/pip
            ~/.platformio/.cache
            ~/.platformio/packages
            ~/.platformio/platforms
          key: pio-${{ runner.os }}-${{ hashFiles('platformio.ini') }}
          restore-keys: pio-${{ runner.os }}-

      - name: Cache PlatformIO project libdeps
        uses: actions/cache@v4
        with:
          path: .pio/libdeps
          key: libdeps-${{ runner.os }}-${{ hashFiles('platformio.ini') }}
          restore-keys: libdeps-${{ runner.os }}-

      - name: Install PlatformIO + intelhex
        run: |
          python -m pip install --upgrade pip
          pip install --upgrade platformio intelhex

      - name: Verify Marauder patch applies cleanly
        run: python scripts/apply_patches.py --status

      - name: Apply patch
        run: python scripts/apply_patches.py

      - name: Build firmware
        run: pio run

      - name: Upload firmware artifact
        uses: actions/upload-artifact@v4
        with:
          name: firmware-${{ github.sha }}
          path: |
            .pio/build/daemonlink-s3/firmware.bin
            .pio/build/daemonlink-s3/firmware.elf
            .pio/build/daemonlink-s3/partitions.bin
          retention-days: 30
          if-no-files-found: warn

  # ===================================================================
  #  Job 2 — PWA deploy
  #  Runs only on push-to-main and only after the firmware build is green.
  #  PRs get a preview channel via the same action (different branch path).
  # ===================================================================
  deploy:
    name: deploy PWA to Firebase Hosting
    runs-on: ubuntu-latest
    needs: firmware
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    timeout-minutes: 10

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        # PWA assets live in web/ — no submodules needed for this job.

      - name: Deploy to Firebase Hosting (live channel)
        uses: FirebaseExtended/action-hosting-deploy@v0
        with:
          repoToken: ${{ secrets.GITHUB_TOKEN }}
          firebaseServiceAccount: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}
          projectId: ${{ secrets.FIREBASE_PROJECT_ID }}
          channelId: live
          entryPoint: .

  # ===================================================================
  #  Job 3 — PR previews
  #  Each pull request gets its own throwaway Firebase Hosting URL so we
  #  can poke the PWA before merging. Auto-expires in 7 days.
  # ===================================================================
  preview:
    name: PR preview channel
    runs-on: ubuntu-latest
    needs: firmware
    if: github.event_name == 'pull_request'
    timeout-minutes: 10
    permissions:
      checks: write
      contents: read
      pull-requests: write

    steps:
      - uses: actions/checkout@v4

      - name: Deploy preview
        uses: FirebaseExtended/action-hosting-deploy@v0
        with:
          repoToken: ${{ secrets.GITHUB_TOKEN }}
          firebaseServiceAccount: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}
          projectId: ${{ secrets.FIREBASE_PROJECT_ID }}
          expires: 7d
          entryPoint: .
