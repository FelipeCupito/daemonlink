; ============================================================================
;  DaemonLink - Headless multiprotocol pentesting daemon (ESP32-S3)
;  Backend: fork de ESP32 Marauder (vendoreado como submodulo) +
;           shims propios en lib/DaemonLink/.
;  Frontend: PWA via Web Serial API (USB-C cableado).
;
;  Layout:
;    external/ESP32Marauder/esp32_marauder/   -> sketch upstream (submodulo)
;    lib/DaemonLink/                          -> nuestros modulos (NFC, CLI, ...)
;    patches/marauder.patch                   -> 4 lineas de inyeccion
;    scripts/apply_patches.py                 -> aplica el patch en cada build
; ============================================================================

[platformio]
default_envs = daemonlink-s3

; PlatformIO compila como "proyecto" lo que vive en src_dir. Apuntamos al
; sketch de Marauder; nuestros modulos se linkean automaticamente porque
; PlatformIO descubre librerias en lib/.
src_dir     = external/ESP32Marauder/esp32_marauder
include_dir = include

; ----------------------------------------------------------------------------
;  Configuracion comun
; ----------------------------------------------------------------------------
[env]
platform        = espressif32 @ ^6.7.0
framework       = arduino
monitor_speed   = 115200
upload_speed    = 921600
monitor_filters = esp32_exception_decoder, time

; Hook pre-build: inicializa el submodulo si hace falta y aplica el patch
; de DaemonLink sobre Marauder. Idempotente: si ya esta aplicado, no hace
; nada. Si el upstream se movio y el patch no aplica, aborta el build con
; un mensaje claro.
extra_scripts =
    pre:scripts/apply_patches.py

; ----------------------------------------------------------------------------
;  Entorno principal: ESP32-S3 DevKitC-1, perfil "headless"
; ----------------------------------------------------------------------------
[env:daemonlink-s3]
board                  = esp32-s3-devkitc-1
board_build.mcu        = esp32s3
board_build.f_cpu      = 240000000L
board_build.f_flash    = 80000000L
board_build.flash_mode = qio
board_build.partitions = huge_app.csv

; --- Banderas de compilacion ------------------------------------------------
;   ARDUINO_USB_CDC_ON_BOOT=1 + ARDUINO_USB_MODE=1
;       -> Serial nativo del S3 aparece como USB CDC (Web Serial API).
;   BOARD_HAS_PSRAM  -> PSRAM habilitada (Marauder la usa para varios scans).
;   HEADLESS_MODE / NO_DISPLAY / NO_BUTTONS / DAEMONLINK
;       -> flags propios de DaemonLink. NOTA: Marauder upstream NO los
;          consume todavia; el board target real (XIAO_ESP32_S3 / MARAUDER_*)
;          se decide en una fase posterior, junto con el ajuste de configs.h.
build_flags =
    -DHEADLESS_MODE=1
    -DMARAUDER_HEADLESS=1
    -DNO_DISPLAY=1
    -DNO_BUTTONS=1
    -DDAEMONLINK=1
    -DARDUINO_USB_MODE=1
    -DARDUINO_USB_CDC_ON_BOOT=1
    -DCORE_DEBUG_LEVEL=2
    -DBOARD_HAS_PSRAM
    -DCONFIG_ARDUHAL_LOG_COLORS=1
    -std=gnu++17

build_unflags =
    -std=gnu++11
    -DHAS_SCREEN
    -DHAS_BUTTONS

; --- Dependencias -----------------------------------------------------------
lib_deps =
    adafruit/Adafruit PN532 @ ^1.3.3
    crankyoldgit/IRremoteESP8266 @ ^2.8.6
    bblanchon/ArduinoJson @ ^7.2.0

; Nuestros modulos viven en lib/DaemonLink/ y los descubre PlatformIO solo.
; No es necesario declararlos aca.

lib_ignore =
    ; Marauder en perfil headless no necesita drivers de pantalla.
    ; Estos ignores evitan que sus deps transitivas se compilen.
    TFT_eSPI
    Adafruit GFX Library
    Adafruit ILI9341
