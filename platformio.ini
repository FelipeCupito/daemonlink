; ============================================================================
;  DaemonLink - Headless multiprotocol pentesting daemon (ESP32-S3)
;  Backend: fork de ESP32 Marauder en modo HEADLESS (sin pantalla / sin botones)
;  Frontend: PWA via Web Serial API (USB-C cableado)
; ============================================================================

[platformio]
default_envs = daemonlink-s3
src_dir      = src
include_dir  = include

; ----------------------------------------------------------------------------
;  Configuracion comun a todos los entornos
; ----------------------------------------------------------------------------
[env]
platform        = espressif32 @ ^6.7.0
framework       = arduino
monitor_speed   = 115200
upload_speed    = 921600
monitor_filters = esp32_exception_decoder, time

; ----------------------------------------------------------------------------
;  Entorno principal: ESP32-S3 DevKitC-1, modo Headless
; ----------------------------------------------------------------------------
[env:daemonlink-s3]
board                = esp32-s3-devkitc-1
board_build.mcu      = esp32s3
board_build.f_cpu    = 240000000L
board_build.f_flash  = 80000000L
board_build.flash_mode = qio
board_build.partitions = huge_app.csv

; --- Banderas de compilacion ------------------------------------------------
;   HEADLESS_MODE=1  -> activa el path "sin UI" en el fork de Marauder
;   MARAUDER_HEADLESS, NO_DISPLAY, NO_BUTTONS  -> desactivan codigo de UI/HW
;   ARDUINO_USB_CDC_ON_BOOT=1 + ARDUINO_USB_MODE=1
;       -> el puerto Serial nativo del S3 aparece como CDC USB (Web Serial)
;   BOARD_HAS_PSRAM  -> habilita PSRAM (necesaria para varios scans Wi-Fi)
build_flags =
    -DHEADLESS_MODE=1
    -DMARAUDER_HEADLESS=1
    -DNO_DISPLAY=1
    -DNO_BUTTONS=1
    -DDAEMONLINK=1
    -DARDUINO_USB_MODE=1
    -DARDUINO_USB_CDC_ON_BOOT=1
    -DCORE_DEBUG_LEVEL=2
    -DBOARD_HAS_PSRAM
    -DCONFIG_ARDUHAL_LOG_COLORS=1
    -std=gnu++17

build_unflags =
    -std=gnu++11
    -DHAS_SCREEN
    -DHAS_BUTTONS

; --- Dependencias -----------------------------------------------------------
;   Adafruit PN532       -> driver NFC/RFID por I2C
;   IRremoteESP8266      -> TX/RX de protocolos infrarrojos
;   ArduinoJson          -> framing estructurado de respuestas hacia la PWA
lib_deps =
    adafruit/Adafruit PN532 @ ^1.3.3
    crankyoldgit/IRremoteESP8266 @ ^2.8.6
    bblanchon/ArduinoJson @ ^7.2.0

lib_ignore =
    ; Marauder en headless no necesita drivers de pantalla.
    ; Si el fork los lleva como deps, ignorarlos aqui evita warnings:
    TFT_eSPI
    Adafruit GFX Library
    Adafruit ILI9341
